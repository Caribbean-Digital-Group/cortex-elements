<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — cortex-ocr</title>
    <script src="/elements.js"></script>
    <link rel="stylesheet" href="/demo.css" />
    <style>
      .model-row {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        margin-top: 0.75rem;
      }
      .model-row label {
        font-size: 0.8125rem;
        color: #64748b;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .model-row input {
        flex: 1;
        background: #0f172a;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 0.5rem;
        color: #f1f5f9;
        font-family: 'Menlo', 'Consolas', monospace;
        font-size: 0.8125rem;
        padding: 0.4rem 0.625rem;
        min-width: 0;
        transition: border-color 0.15s;
      }
      .model-row input:focus { outline: none; border-color: #06b6d4; }
    </style>
  </head>
  <body>
    <nav class="demo-nav">
      <a href="/">← Índice</a>
      <span class="badge">cortex-ocr</span>
    </nav>

    <h1 class="demo-title">cortex-ocr</h1>
    <p class="demo-subtitle">Extrae datos estructurados de documentos oficiales (INE, pasaporte, CURP, RFC…)</p>

    <!-- Config card -->
    <div class="token-card">
      <label class="token-card__label" for="token-input">API Token</label>
      <div class="token-card__row">
        <textarea
          id="token-input"
          rows="3"
          placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <button class="token-card__btn" id="apply-btn">Aplicar</button>
      </div>

      <div class="token-card__url">
        <span class="token-card__url-label">API URL</span>
        <input
          id="api-url-input"
          type="url"
          placeholder="http://localhost:8000  (vacío = producción)"
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <!-- Model selector -->
      <div class="model-row">
        <label for="model-input">Modelo OCR</label>
        <input
          id="model-input"
          list="model-list"
          placeholder="mistral-ocr-latest"
          spellcheck="false"
          autocomplete="off"
        />
        <datalist id="model-list">
          <option value="mistral-ocr-latest"></option>
          <option value="glm-ocr"></option>
        </datalist>
      </div>

      <p id="token-status" class="token-card__status"></p>
    </div>

    <!-- Element — shown only after token is applied -->
    <div id="element-wrapper" class="element-wrapper">
      <cortex-ocr id="ocr" mode="both" accept="image/*,application/pdf"></cortex-ocr>
    </div>

    <p class="result-label">Resultado</p>
    <pre id="output">El resultado aparecerá aquí después de procesar un documento.</pre>

    <script type="module">
      import { initDemo } from '/demo.js'

      const KEY_MODEL = 'cortex_demo_ocr_model'
      const output    = document.getElementById('output')
      const modelInput = document.getElementById('model-input')
      const el = document.getElementById('ocr')

      // Restore saved model
      const savedModel = localStorage.getItem(KEY_MODEL)
      if (savedModel) modelInput.value = savedModel

      // Apply model to element whenever it changes
      function applyModel() {
        const model = modelInput.value.trim() || 'mistral-ocr-latest'
        localStorage.setItem(KEY_MODEL, model)
        el.setAttribute('model', model)
      }

      modelInput.addEventListener('change', applyModel)
      modelInput.addEventListener('input', () => {
        // Only apply on explicit selection from datalist
        if ([...document.getElementById('model-list').options].some(o => o.value === modelInput.value)) {
          applyModel()
        }
      })

      initDemo({
        elementId: 'ocr',
        onApply(el) {
          // Apply saved or entered model on init
          applyModel()

          el.onResult = (data) => {
            output.textContent = JSON.stringify(data, null, 2)
          }
          el.addEventListener('cortex:error', (e) => {
            output.textContent = 'Error:\n' + JSON.stringify(e.detail, null, 2)
          })
          el.addEventListener('cortex:loading', (e) => {
            if (e.detail.loading) output.textContent = 'Procesando...'
          })
        },
      })
    </script>
  </body>
</html>
